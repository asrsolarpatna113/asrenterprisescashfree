        <!-- MSG91 OTP - Production Ready Configuration -->
        <script type="text/javascript">
            // Set backend URL for API calls
            window.REACT_APP_BACKEND_URL = window.location.origin.includes('localhost') 
                ? 'http://localhost:8001' 
                : window.location.origin;
            
            // MSG91 Production Configuration
            // Widget ID and Token Auth are injected at build time via env vars:
            //   REACT_APP_MSG91_WIDGET_ID
            //   REACT_APP_MSG91_TOKEN_AUTH
            // Make sure your domain is whitelisted in MSG91 dashboard.
            window.msg91Configuration = {
                widgetId: "%REACT_APP_MSG91_WIDGET_ID%",
                tokenAuth: "%REACT_APP_MSG91_TOKEN_AUTH%",
                identifier: "",
                exposeMethods: true,
                success: function (data) {
                    console.log("[MSG91] OTP Verified Successfully:", data);
                    window.otpVerificationStatus = 'verified';
                    window.otpVerificationData = data;
                    
                    // Dispatch success event for React components
                    window.dispatchEvent(new CustomEvent('msg91OtpSuccess', { detail: data }));
                    
                    if (window.pendingLoginType === 'admin' || window.pendingLoginType === 'staff') {
                        window.completeOTPLogin(window.pendingLoginMobile, window.pendingLoginType);
                    } else {
                        window.dispatchEvent(new CustomEvent('otpVerified', { detail: data }));
                    }
                },
                failure: function (error) {
                    console.error("[MSG91] OTP Verification Failed:", error);
                    window.otpVerificationStatus = 'failed';
                    window.otpVerificationError = error;
                    
                    // Dispatch failure event for React components to handle inline
                    window.dispatchEvent(new CustomEvent('msg91OtpFailed', { detail: error }));
                    
                    // Clear pending login data
                    window.pendingLoginMobile = '';
                    window.pendingLoginType = '';
                    // NOTE: Do NOT call alert() here — the React components handle
                    // the msg91OtpFailed event and show errors inline without
                    // disruptive native browser dialogs.
                },
                VAR1: "OTP"
            };
            
            // OTP Flow State Management
            window.pendingLoginMobile = '';
            window.pendingLoginType = '';
            window.otpVerificationStatus = null;
            window.msg91LoadAttempts = 0;
            window.msg91Loaded = false;
            
            // Complete OTP Login function (called after successful OTP verification)
            window.completeOTPLogin = async function(mobile, loginType) {
                console.log("[MSG91] Completing OTP login for:", mobile, loginType);
                try {
                    const response = await fetch(window.REACT_APP_BACKEND_URL + '/api/admin/login-otp', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ mobile: mobile.replace(/\D/g, '') })
                    });
                    const result = await response.json();
                    console.log("[MSG91] Login API response:", result);
                    
                    if (response.ok && result.success) {
                        if (result.role === 'admin') {
                            localStorage.setItem("asrAdminAuth", "true");
                            localStorage.setItem("asrAdminEmail", result.email || mobile);
                            localStorage.setItem("asrAdminRole", result.role);
                            localStorage.setItem("asrAdminName", result.name || "Admin");
                            localStorage.setItem("asrAdminLastActivity", Date.now().toString());
                            alert("Login successful! Redirecting to Admin Dashboard...");
                            window.location.href = "/admin/dashboard";
                        } else {
                            localStorage.setItem("asrStaffAuth", "true");
                            localStorage.setItem("asrStaffData", JSON.stringify({
                                name: result.name, email: result.email, role: result.role, staff_id: result.staff_id
                            }));
                            alert("Login successful! Redirecting to Staff Portal...");
                            window.location.href = "/staff/portal";
                        }
                    } else {
                        console.error("[MSG91] Login failed:", result);
                        alert(result.detail || result.message || "Mobile number not registered. Please contact admin.");
                        window.location.reload();
                    }
                } catch (error) {
                    console.error("[MSG91] Login API error:", error);
                    alert("Login failed. Please check your connection and try again.");
                    window.location.reload();
                } finally {
                    window.pendingLoginMobile = '';
                    window.pendingLoginType = '';
                }
            };
            
            // Load MSG91 script on demand with retry logic
            window.loadMSG91 = function() {
                return new Promise((resolve, reject) => {
                    // Already loaded and initialized
                    if (typeof window.sendOtp === 'function') {
                        console.log("[MSG91] Already initialized with sendOtp");
                        window.msg91Loaded = true;
                        resolve();
                        return;
                    }
                    if (typeof window.initSendOTP === 'function') {
                        console.log("[MSG91] initSendOTP available, initializing...");
                        try {
                            window.initSendOTP(window.msg91Configuration);
                            window.msg91Loaded = true;
                        } catch(e) {
                            console.warn("[MSG91] initSendOTP call failed:", e);
                        }
                        resolve();
                        return;
                    }
                    
                    // Check load attempts to prevent infinite retry
                    window.msg91LoadAttempts++;
                    if (window.msg91LoadAttempts > 3) {
                        console.error("[MSG91] Max load attempts reached");
                        reject(new Error('MSG91 script failed to load after 3 attempts'));
                        return;
                    }
                    
                    // Production URL
                    var scriptUrl = 'https://verify.msg91.com/otp-provider.js';
                    console.log("[MSG91] Loading from:", scriptUrl);
                    
                    var script = document.createElement('script');
                    script.src = scriptUrl;
                    script.async = true;
                    // NOTE: Do NOT set crossOrigin - it causes CORS blocking
                    
                    script.onload = function() {
                        console.log("[MSG91] Script loaded successfully");
                        window.msg91Loaded = true;
                        
                        // Initialize the widget IMMEDIATELY after script loads
                        setTimeout(function() {
                            if (typeof window.initSendOTP === 'function') {
                                console.log("[MSG91] Calling initSendOTP with configuration");
                                try {
                                    window.initSendOTP(window.msg91Configuration);
                                    console.log("[MSG91] Widget initialized successfully");
                                } catch(e) {
                                    console.warn("[MSG91] initSendOTP error:", e);
                                }
                            }
                            resolve();
                        }, 300);
                    };
                    
                    script.onerror = function(error) {
                        console.error("[MSG91] Failed to load script:", error);
                        reject(new Error('Failed to load MSG91 script'));
                    };
                    
                    document.head.appendChild(script);
                    
                    // Timeout after 15 seconds
                    setTimeout(function() {
                        if (!window.msg91Loaded && typeof window.initSendOTP !== 'function') {
                            reject(new Error('MSG91 script load timeout'));
                        }
                    }, 15000);
                });
            };
            
            // Trigger OTP functions with better error handling
            window.triggerLoginOTP = async function(phoneNumber, loginType) {
                console.log("[MSG91] Triggering OTP for:", phoneNumber, loginType);
                window.pendingLoginMobile = phoneNumber;
                window.pendingLoginType = loginType;
                
                let formattedPhone = phoneNumber.replace(/\D/g, '');
                if (formattedPhone.length === 10) formattedPhone = '91' + formattedPhone;
                window.msg91Configuration.identifier = formattedPhone;
                
                try {
                    await window.loadMSG91();
                    
                    if (typeof window.initSendOTP === 'function') {
                        console.log("[MSG91] Calling initSendOTP");
                        window.initSendOTP(window.msg91Configuration);
                    } else if (typeof window.sendOtp === 'function') {
                        console.log("[MSG91] Calling sendOtp");
                        window.sendOtp(formattedPhone);
                    } else {
                        throw new Error("OTP methods not available");
                    }
                } catch (error) {
                    console.error("[MSG91] Error triggering OTP:", error);
                    alert("OTP service temporarily unavailable. Please try again or contact support.");
                }
            };
            
            window.triggerOTPVerification = async function(phoneNumber) {
                console.log("[MSG91] Triggering OTP verification for:", phoneNumber);
                window.pendingLoginType = 'inquiry';
                
                let formattedPhone = phoneNumber.replace(/\D/g, '');
                if (formattedPhone.length === 10) formattedPhone = '91' + formattedPhone;
                window.msg91Configuration.identifier = formattedPhone;
                
                try {
                    await window.loadMSG91();
                    if (typeof window.initSendOTP === 'function') {
                        window.initSendOTP(window.msg91Configuration);
                    } else if (typeof window.sendOtp === 'function') {
                        window.sendOtp(formattedPhone);
                    } else {
                        throw new Error("OTP methods not available");
                    }
                } catch (error) {
                    console.error("[MSG91] Error triggering OTP verification:", error);
                    alert("OTP service temporarily unavailable. Please try again.");
                }
            };
            
            // Pre-load MSG91 on login pages for faster OTP
            if (window.location.pathname.includes('/login') || 
                window.location.pathname.includes('/admin') || 
                window.location.pathname.includes('/staff')) {
                console.log("[MSG91] Pre-loading on login page");
                setTimeout(() => window.loadMSG91().catch(() => {}), 1000);
            }
        </script>
